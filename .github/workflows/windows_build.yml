name: Build Windows App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build for Windows
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive # <--- این بخش برای دانلود ساب‌ماژول‌های Rust اضافه شد

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: "stable"

      - name: Install Dependencies
        working-directory: ./flutter
        shell: bash
        run: |
          flutter pub get -v 2>&1 | tee ../pub_get_log.txt
          if [ ${PIPESTATUS[0]} -ne 0 ]; then exit 1; fi

      - name: Commit and Push pub get Log
        shell: bash
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add pub_get_log.txt
          git commit -m "Add pub get log" || echo "No changes to commit"
          git pull --rebase --autostash origin main
          git push

      - name: Install LLVM
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "15.0"
          directory: ${{ runner.temp }}/llvm

      - name: Install vcpkg dependencies
        run: |
          vcpkg install libopus:x64-windows-static
          vcpkg integrate install

      - name: Run build.py (Compile Rust & Generate Bridge)
        shell: bash
        env:
          VCPKG_ROOT: C:\vcpkg
          BINDGEN_EXTRA_CLANG_ARGS: "-I C:/vcpkg/installed/x64-windows-static/include"
        run: |
          # نصب وابستگی‌های احتمالی پایتون (مثل درخواست‌های بیلد)
          python -m pip install --upgrade pip
          # اجرای اسکریپت بیلد
          python build.py

      - name: Generate Code
        working-directory: ./flutter
        shell: bash
        run: |
          flutter pub run build_runner build --delete-conflicting-outputs
          if [ ${PIPESTATUS[0]} -ne 0 ]; then exit 1; fi

      - name: Build Windows Release
        working-directory: ./flutter
        shell: bash
        env:
          RENDEZVOUS_SERVER: "185.192.113.204"
          RS_PUB_KEY: "nq0HcZjf94JGTpvGCazMxyEmIHEFxpXOFDa0C12A3a8="
        run: |
          flutter build windows --release -v 2>&1 | tee ../build_log.txt
          if [ ${PIPESTATUS[0]} -ne 0 ]; then exit 1; fi

      - name: Commit and Push Build Log
        if: always()
        shell: bash
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add build_log.txt
          git commit -m "Add build log" || echo "No changes to commit"
          git pull --rebase --autostash origin main
          git push

      - name: Commit and Push EXE file to Repository
        shell: bash
        run: |
          mkdir -p releases
          cp -r flutter/build/windows/x64/runner/Release/* releases/ || echo "No EXE found to copy"
          cp -r flutter/build/windows/runner/Release/* releases/ || echo "No EXE found to copy"
          git add releases/
          git commit -m "Add compiled EXE files" || echo "No changes to commit"
          git pull --rebase --autostash origin main
          git push

      - name: Upload Output Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            flutter/build/windows/x64/runner/Release/
            flutter/build/windows/runner/Release/

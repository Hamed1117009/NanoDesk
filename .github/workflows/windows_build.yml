name: Build Windows App

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build for Windows
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: "stable"

      - name: Install LLVM and Clang
        run: |
          choco install llvm -y
          echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install vcpkg dependencies
        run: vcpkg integrate install

      - name: Install flutter_rust_bridge_codegen
        shell: bash
        run: cargo install flutter_rust_bridge_codegen --version 1.82.6

      - name: Install Dependencies
        working-directory: ./flutter
        shell: bash
        run: flutter pub get -v > ../pub_get_log.txt 2>&1

      - name: Commit and Push pub get Log
        continue-on-error: true
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add pub_get_log.txt || true
          git commit -m "Add pub get log [skip ci]" || echo "No changes to commit"
          git pull --rebase || true
          git push || echo "Push failed, continuing anyway"

      - name: Verify Rust Files Exist
        shell: bash
        run: |
          echo "Checking for Rust FFI files..."
          ls -la src/flutter_ffi.rs || echo "flutter_ffi.rs not found!"
          ls -la flutter/lib/ || echo "flutter/lib/ not found!"

      - name: Generate Rust Bridge Code
        shell: bash
        env:
          LLVM_PATH: "C:\\Program Files\\LLVM"
        run: |
          flutter_rust_bridge_codegen \
            --rust-input src/flutter_ffi.rs \
            --dart-output flutter/lib/generated_bridge.dart \
            --c-output src/bridge_generated.h

      - name: Verify Generated Files
        shell: bash
        run: |
          echo "Checking generated files..."
          ls -la flutter/lib/generated_bridge.dart || echo "generated_bridge.dart NOT created!"
          ls -la src/bridge_generated.h || echo "bridge_generated.h NOT created!"

      - name: Build Rust Library
        shell: bash
        run: cargo build --release --features flutter

      - name: Build Windows Release
        working-directory: ./flutter
        continue-on-error: true
        shell: bash
        env:
          RENDEZVOUS_SERVER: "185.192.113.204"
          RS_PUB_KEY: "nq0HcZjf94JGTpvGCazMxyEmIHEFxpXOFDa0C12A3a8="
        run: flutter build windows --release -v > ../build_log.txt 2>&1

      - name: Commit and Push Build Log
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add build_log.txt || true
          git commit -m "Add build log [skip ci]" || echo "No changes to commit"
          git pull --rebase || true
          git push || echo "Push failed, continuing anyway"

      - name: Commit and Push EXE file to Repository
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p releases
          cp -r flutter/build/windows/x64/runner/Release/* releases/ 2>/dev/null || cp -r flutter/build/windows/runner/Release/* releases/ 2>/dev/null || echo "No EXE found to copy"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add releases/ || true
          git commit -m "Add compiled Windows Release files [skip ci]" || echo "No changes to commit"
          git pull --rebase || true
          git push || echo "Push failed, continuing anyway"

      - name: Upload Output Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NanoDesk-Windows-Release
          path: |
            flutter/build/windows/x64/runner/Release/
            flutter/build/windows/runner/Release/

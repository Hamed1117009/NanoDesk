name: Build Windows App

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build for Windows
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: "stable"

      - name: Install LLVM and Clang
        run: |
          choco install llvm -y
          $llvmPath = "C:\Program Files\LLVM\bin"
          echo $llvmPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "LLVM_PATH=C:\Program Files\LLVM" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install vcpkg dependencies
        run: vcpkg integrate install

      - name: Install flutter_rust_bridge_codegen
        shell: bash
        run: |
          cargo install flutter_rust_bridge_codegen --version 1.82.6 --force
          flutter_rust_bridge_codegen --version

      - name: Install Dependencies
        working-directory: ./flutter
        shell: bash
        run: flutter pub get -v > ../pub_get_log.txt 2>&1

      - name: Commit and Push pub get Log
        continue-on-error: true
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add pub_get_log.txt || true
          git commit -m "Add pub get log [skip ci]" || true
          git pull --rebase || true
          git push || true

      - name: Verify FFI File Exists
        shell: bash
        run: |
          echo "=== Checking src/flutter_ffi.rs ==="
          if [ -f "src/flutter_ffi.rs" ]; then
            echo "✅ src/flutter_ffi.rs found"
            echo "File size: $(wc -c < src/flutter_ffi.rs) bytes"
            echo ""
            echo "First 20 lines:"
            head -n 20 src/flutter_ffi.rs
          else
            echo "❌ CRITICAL: src/flutter_ffi.rs NOT found!"
            ls -la src/
            exit 1
          fi

      - name: Generate Rust Bridge Code
        shell: bash
        run: |
          echo "=== Starting Code Generation ==="
          echo "LLVM_PATH: $LLVM_PATH"
          echo "PATH: $PATH"

          # ایجاد دایرکتوری‌های خروجی
          mkdir -p flutter/lib
          mkdir -p src

          # اجرای codegen با مسیر دقیق
          flutter_rust_bridge_codegen \
            --rust-input src/flutter_ffi.rs \
            --dart-output flutter/lib/generated_bridge.dart \
            --c-output src/bridge_generated.h \
            --verbose || {
              echo ""
              echo "⚠️ First attempt failed, trying with explicit LLVM configuration..."
              export LLVM_PATH="C:/Program Files/LLVM"
              export PATH="$LLVM_PATH/bin:$PATH"
              export LIBCLANG_PATH="$LLVM_PATH/bin"
              
              flutter_rust_bridge_codegen \
                --rust-input src/flutter_ffi.rs \
                --dart-output flutter/lib/generated_bridge.dart \
                --c-output src/bridge_generated.h \
                --verbose
            }

      - name: Verify Generated Files
        shell: bash
        run: |
          echo "=== Verifying Generated Files ==="

          if [ -f "flutter/lib/generated_bridge.dart" ]; then
            echo "✅ generated_bridge.dart created successfully"
            echo "File size: $(wc -c < flutter/lib/generated_bridge.dart) bytes"
            echo ""
            echo "First 30 lines:"
            head -n 30 flutter/lib/generated_bridge.dart
          else
            echo "❌ CRITICAL: generated_bridge.dart NOT created!"
            echo ""
            echo "Contents of flutter/lib/:"
            ls -la flutter/lib/
            echo ""
            echo "Checking if directory exists:"
            [ -d "flutter/lib" ] && echo "Directory exists" || echo "Directory missing"
            exit 1
          fi

          if [ -f "src/bridge_generated.h" ]; then
            echo ""
            echo "✅ bridge_generated.h created"
            echo "File size: $(wc -c < src/bridge_generated.h) bytes"
          else
            echo ""
            echo "⚠️ bridge_generated.h not found (may not be critical)"
          fi

      - name: Build Rust Library
        shell: bash
        run: |
          echo "=== Building Rust Library ==="
          cargo build --release --verbose

      - name: Build Windows Release
        working-directory: ./flutter
        continue-on-error: true
        shell: bash
        env:
          RENDEZVOUS_SERVER: "185.192.113.204"
          RS_PUB_KEY: "nq0HcZjf94JGTpvGCazMxyEmIHEFxpXOFDa0C12A3a8="
        run: flutter build windows --release -v > ../build_log.txt 2>&1

      - name: Commit and Push Build Log
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add build_log.txt || true
          git commit -m "Add build log [skip ci]" || true
          git pull --rebase || true
          git push || true

      - name: Commit and Push EXE file to Repository
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p releases
          cp -r flutter/build/windows/x64/runner/Release/* releases/ 2>/dev/null || \
          cp -r flutter/build/windows/runner/Release/* releases/ 2>/dev/null || \
          echo "No release files found"

          git add releases/ || true
          git commit -m "Add compiled Windows Release files [skip ci]" || true
          git pull --rebase || true
          git push || true

      - name: Upload Output Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NanoDesk-Windows-Release
          path: |
            flutter/build/windows/x64/runner/Release/
            flutter/build/windows/runner/Release/

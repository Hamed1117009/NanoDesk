name: Build Windows App

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write # این خط به بات گیت‌هاب اجازه می‌دهد فایل لاگ را روی ریپازیتوری شما ذخیره کند

jobs:
  build:
    name: Build for Windows
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0"
          channel: "stable"

      - name: Install Dependencies
        run: flutter pub get -v > pub_get_log.txt 2>&1
        continue-on-error: true

      - name: Commit and Push pub get Log
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add pub_get_log.txt
          git commit -m "Add error log for flutter pub get" || echo "No changes to commit"
          git push

      - name: Build Windows Release
        continue-on-error: true
        run: flutter build windows --release -v > build_log.txt 2>&1

      - name: Commit and Push Build Log
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add build_log.txt
          git commit -m "Add build log" || echo "No changes to commit"
          git push

      - name: Upload Output Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NanoDesk-Windows-Release
          path: build/windows/runner/Release/

name: Debug Codegen Only

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  debug-codegen:
    name: Debug Code Generation
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM (Method 1 - Chocolatey)
        shell: bash
        run: |
          echo "=== Installing LLVM via Chocolatey ==="
          choco install llvm -y
          
          echo ""
          echo "=== Verifying installation ==="
          ls -la "C:/Program Files/LLVM/bin/" || echo "Not found"
          
          if [ -f "C:/Program Files/LLVM/bin/libclang.dll" ]; then
            echo "✅ libclang.dll found"
          else
            echo "❌ libclang.dll NOT found"
          fi

      - name: Try Alternative LLVM (Method 2 - Direct Download)
        if: always()
        shell: bash
        run: |
          echo "=== Trying direct LLVM download ==="
          
          # دانلود LLVM 15
          curl -L -o llvm-installer.exe "https://github.com/llvm/llvm-project/releases/download/llvmorg-15.0.7/LLVM-15.0.7-win64.exe"
          
          echo ""
          echo "=== Installing LLVM silently ==="
          ./llvm-installer.exe /S
          
          sleep 30  # صبر برای تکمیل نصب
          
          echo ""
          echo "=== Checking installation ==="
          ls -la "C:/Program Files/LLVM/bin/" || echo "Still not found"

      - name: Set Environment Variables
        shell: bash
        run: |
          echo "=== Setting all possible LLVM paths ==="
          
          # روش 1: GITHUB_PATH
          echo "C:/Program Files/LLVM/bin" >> $GITHUB_PATH
          
          # روش 2: GITHUB_ENV
          echo "LLVM_PATH=C:/Program Files/LLVM" >> $GITHUB_ENV
          echo "LIBCLANG_PATH=C:/Program Files/LLVM/bin" >> $GITHUB_ENV
          echo "LLVM_SYS_150_PREFIX=C:/Program Files/LLVM" >> $GITHUB_ENV
          
          # روش 3: مستقیم در shell
          export PATH="C:/Program Files/LLVM/bin:$PATH"
          export LLVM_PATH="C:/Program Files/LLVM"
          export LIBCLANG_PATH="C:/Program Files/LLVM/bin"
          
          echo ""
          echo "=== Verifying clang ==="
          which clang || echo "clang not in PATH"
          clang --version || echo "clang not executable"

      - name: Install flutter_rust_bridge_codegen
        shell: bash
        run: |
          echo "=== Installing codegen tool ==="
          cargo install flutter_rust_bridge_codegen --version 1.82.6 --force
          
          echo ""
          echo "=== Verification ==="
          which flutter_rust_bridge_codegen
          flutter_rust_bridge_codegen --version

      - name: Verify Input File
        shell: bash
        run: |
          echo "=== Checking src/flutter_ffi.rs ==="
          
          if [ ! -f "src/flutter_ffi.rs" ]; then
            echo "❌ CRITICAL: src/flutter_ffi.rs NOT FOUND!"
            echo ""
            echo "Repository structure:"
            find . -name "*.rs" -type f | head -20
            exit 1
          fi
          
          echo "✅ File exists"
          echo "Size: $(stat -c%s src/flutter_ffi.rs 2>/dev/null || stat -f%z src/flutter_ffi.rs) bytes"
          echo ""
          echo "First 50 lines:"
          head -n 50 src/flutter_ffi.rs

      - name: Test 1 - Basic Codegen
        shell: bash
        run: |
          echo "=========================================="
          echo "TEST 1: Basic codegen with minimal flags"
          echo "=========================================="
          
          mkdir -p flutter/lib
          mkdir -p src
          
          # تنظیم environment
          export LLVM_PATH="C:/Program Files/LLVM"
          export LIBCLANG_PATH="C:/Program Files/LLVM/bin"
          export LLVM_SYS_150_PREFIX="C:/Program Files/LLVM"
          export PATH="C:/Program Files/LLVM/bin:$PATH"
          
          echo "Environment:"
          echo "  LLVM_PATH=$LLVM_PATH"
          echo "  LIBCLANG_PATH=$LIBCLANG_PATH"
          echo "  PATH=$PATH"
          echo ""
          
          # اجرای codegen
          set -x
          flutter_rust_bridge_codegen \
            --rust-input src/flutter_ffi.rs \
            --dart-output flutter/lib/generated_bridge.dart \
            2>&1 | tee test1_output.log
          
          TEST1_EXIT=$?
          set +x
          
          echo ""
          echo "Exit code: $TEST1_EXIT"
          
          if [ $TEST1_EXIT -eq 0 ]; then
            echo "✅ TEST 1 PASSED"
            
            if [ -f "flutter/lib/generated_bridge.dart" ]; then
              echo "✅ Output file created"
              echo "Size: $(stat -c%s flutter/lib/generated_bridge.dart 2>/dev/null || stat -f%z flutter/lib/generated_bridge.dart) bytes"
            else
              echo "❌ Output file NOT created despite exit 0"
            fi
          else
            echo "❌ TEST 1 FAILED with exit code $TEST1_EXIT"
            echo ""
            echo "Full output:"
            cat test1_output.log
          fi

      - name: Test 2 - Codegen with C Header
        if: always()
        shell: bash
        run: |
          echo "=========================================="
          echo "TEST 2: Codegen with C header output"
          echo "=========================================="
          
          rm -f flutter/lib/generated_bridge.dart src/bridge_generated.h
          
          export LLVM_PATH="C:/Program Files/LLVM"
          export LIBCLANG_PATH="C:/Program Files/LLVM/bin"
          export LLVM_SYS_150_PREFIX="C:/Program Files/LLVM"
          export PATH="C:/Program Files/LLVM/bin:$PATH"
          
          set -x
          flutter_rust_bridge_codegen \
            --rust-input src/flutter_ffi.rs \
            --dart-output flutter/lib/generated_bridge.dart \
            --c-output src/bridge_generated.h \
            2>&1 | tee test2_output.log
          
          TEST2_EXIT=$?
          set +x
          
          echo ""
          echo "Exit code: $TEST2_EXIT"
          
          if [ $TEST2_EXIT -eq 0 ]; then
            echo "✅ TEST 2 PASSED"
          else
            echo "❌ TEST 2 FAILED with exit code $TEST2_EXIT"
            cat test2_output.log
          fi

      - name: Test 3 - Verbose Mode
        if: always()
        shell: bash
        run: |
          echo "=========================================="
          echo "TEST 3: Verbose mode"
          echo "=========================================="
          
          rm -f flutter/lib/generated_bridge.dart
          
          export LLVM_PATH="C:/Program Files/LLVM"
          export LIBCLANG_PATH="C:/Program Files/LLVM/bin"
          export LLVM_SYS_150_PREFIX="C:/Program Files/LLVM"
          export PATH="C:/Program Files/LLVM/bin:$PATH"
          
          set -x
          flutter_rust_bridge_codegen \
            --rust-input src/flutter_ffi.rs \
            --dart-output flutter/lib/generated_bridge.dart \
            --verbose \
            2>&1 | tee test3_output.log
          
          TEST3_EXIT=$?
          set +x
          
          echo ""
          echo "Exit code: $TEST3_EXIT"
          
          if [ $TEST3_EXIT -eq 0 ]; then
            echo "✅ TEST 3 PASSED"
          else
            echo "❌ TEST 3 FAILED with exit code $TEST3_EXIT"
            cat test3_output.log
          fi

      - name: Test 4 - Check libclang Binding
        if: always()
        shell: bash
        run: |
          echo "=========================================="
          echo "TEST 4: Direct libclang test"
          echo "=========================================="
          
          # تست مستقیم libclang
          cat > test_libclang.rs << 'EOF'
fn main() {
    match std::env::var("LIBCLANG_PATH") {
        Ok(path) => println!("LIBCLANG_PATH: {}", path),
        Err(_) => println!("LIBCLANG_PATH not set"),
    }
    
    // تست bindgen
    println!("Testing clang-sys...");
}
EOF
          
          rustc test_libclang.rs -o test_libclang.exe || echo "Compile failed"
          ./test_libclang.exe || echo "Run failed"

      - name: Summary Report
        if: always()
        shell: bash
        run: |
          echo "=========================================="
          echo "DIAGNOSTIC SUMMARY"
          echo "=========================================="
          
          echo ""
          echo "=== LLVM Installation ==="
          if [ -f "C:/Program Files/LLVM/bin/libclang.dll" ]; then
            echo "✅ libclang.dll present"
          else
            echo "❌ libclang.dll missing"
          fi
          
          echo ""
          echo "=== Codegen Tool ==="
          which flutter_rust_bridge_codegen && echo "✅ In PATH" || echo "❌ Not in PATH"
          
          echo ""
          echo "=== Input File ==="
          [ -f "src/flutter_ffi.rs" ] && echo "✅ Present" || echo "❌ Missing"
          
          echo ""
          echo "=== Output File ==="
          if [ -f "flutter/lib/generated_bridge.dart" ]; then
            echo "✅ Generated successfully"
            echo "Size: $(stat -c%s flutter/lib/generated_bridge.dart 2>/dev/null || stat -f%z flutter/lib/generated_bridge.dart) bytes"
          else
            echo "❌ Not generated"
          fi
          
          echo ""
          echo "=== Test Results ==="
          [ -f "test1_output.log" ] && echo "Test 1: $(grep -q 'Exit code: 0' test1_output.log && echo '✅ PASS' || echo '❌ FAIL')"
          [ -f "test2_output.log" ] && echo "Test 2: $(grep -q 'Exit code: 0' test2_output.log && echo '✅ PASS' || echo '❌ FAIL')"
          [ -f "test3_output.log" ] && echo "Test 3: $(grep -q 'Exit code: 0' test3_output.log && echo '✅ PASS' || echo '❌ FAIL')"

      - name: Upload All Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codegen-diagnostic-logs
          path: |
            test1_output.log
            test2_output.log
            test3_output.log
            flutter/lib/generated_bridge.dart

      - name: Commit Logs to Repo
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add test*.log || true
          git add flutter/lib/generated_bridge.dart || true
          
          git commit -m "Add codegen diagnostic logs [skip ci]" || true
          git pull --rebase || true
          git push || true

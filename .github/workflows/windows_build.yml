name: Build Windows App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      LIBCLANG_PATH: "C:/Program Files/LLVM/bin"
      BINDGEN_EXTRA_CLANG_ARGS: "-I C:/vcpkg/installed/x64-windows-static/include -I C:/vcpkg/installed/x64-windows-static/include/opus -I C:/vcpkg/installed/x64-windows-static/include/aom"
      VCPKG_ROOT: "C:/vcpkg"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install C++ Dependencies (vcpkg)
        run: |
          vcpkg integrate install
          vcpkg install opus:x64-windows-static libvpx:x64-windows-static libyuv:x64-windows-static aom:x64-windows-static --classic

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: "stable"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Generate Rust/Dart Bindings
        run: python build.py --flutter

      - name: Install Flutter Dependencies
        working-directory: ./flutter
        run: flutter pub get

      - name: Run Build Runner
        working-directory: ./flutter # <--- این خط اضافه شد
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows App (Release)
        working-directory: ./flutter # <--- این خط اضافه شد
        run: flutter build windows --release

      - name: Prepare Release Directory
        run: |
          mkdir -p releases
          # مسیر بیلد اصلاح شد تا پوشه flutter را در نظر بگیرد
          cp -r flutter/build/windows/x64/runner/Release/* releases/

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NanoDesk-Windows-Release
          path: releases/

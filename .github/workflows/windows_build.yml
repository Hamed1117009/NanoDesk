name: Build Windows App

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build for Windows
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: "stable"

      - name: Install LLVM and Clang
        run: |
          choco install llvm -y
          $llvmPath = "C:\Program Files\LLVM\bin"
          echo $llvmPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "LLVM_PATH=C:\Program Files\LLVM" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install vcpkg dependencies
        run: vcpkg integrate install

      - name: Install flutter_rust_bridge_codegen
        shell: bash
        run: |
          cargo install flutter_rust_bridge_codegen --version 1.82.6 --force
          flutter_rust_bridge_codegen --version

      - name: Install Dependencies
        working-directory: ./flutter
        shell: bash
        run: flutter pub get -v > ../pub_get_log.txt 2>&1

      - name: Commit and Push pub get Log
        continue-on-error: true
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add pub_get_log.txt || true
          git commit -m "Add pub get log [skip ci]" || true
          git pull --rebase || true
          git push || true

      - name: Debug - List Project Structure
        shell: bash
        run: |
          echo "=== Root directory ==="
          ls -la
          echo "=== src/ directory ==="
          ls -la src/ || echo "src/ not found!"
          echo "=== flutter/lib/ directory ==="
          ls -la flutter/lib/ || echo "flutter/lib/ not found!"
          echo "=== Checking for flutter_ffi.rs ==="
          find . -name "flutter_ffi.rs" -o -name "*ffi*.rs" || echo "No FFI files found!"

      - name: Generate Rust Bridge Code
        shell: bash
        continue-on-error: false
        run: |
          echo "Current directory: $(pwd)"
          echo "LLVM_PATH: $LLVM_PATH"

          # بررسی وجود فایل ورودی
          if [ ! -f "src/flutter_ffi.rs" ]; then
            echo "ERROR: src/flutter_ffi.rs not found!"
            echo "Searching for alternative FFI files..."
            find . -name "*ffi*.rs"
            exit 1
          fi

          # اجرای codegen با verbose output
          flutter_rust_bridge_codegen \
            --rust-input src/flutter_ffi.rs \
            --dart-output flutter/lib/generated_bridge.dart \
            --c-output src/bridge_generated.h \
            --verbose || {
              echo "Codegen failed! Trying with different LLVM path..."
              export LLVM_PATH="C:/Program Files/LLVM"
              flutter_rust_bridge_codegen \
                --rust-input src/flutter_ffi.rs \
                --dart-output flutter/lib/generated_bridge.dart \
                --c-output src/bridge_generated.h \
                --verbose
            }

      - name: Verify Generated Files
        shell: bash
        run: |
          echo "=== Checking generated files ==="
          if [ -f "flutter/lib/generated_bridge.dart" ]; then
            echo "✅ generated_bridge.dart created successfully"
            head -n 20 flutter/lib/generated_bridge.dart
          else
            echo "❌ generated_bridge.dart NOT created!"
            exit 1
          fi

          if [ -f "src/bridge_generated.h" ]; then
            echo "✅ bridge_generated.h created successfully"
          else
            echo "⚠️ bridge_generated.h NOT created (may not be critical)"
          fi

      - name: Build Rust Library
        shell: bash
        run: |
          echo "Building Rust library..."
          cargo build --release --features flutter --verbose

      - name: Build Windows Release
        working-directory: ./flutter
        continue-on-error: true
        shell: bash
        env:
          RENDEZVOUS_SERVER: "185.192.113.204"
          RS_PUB_KEY: "nq0HcZjf94JGTpvGCazMxyEmIHEFxpXOFDa0C12A3a8="
        run: flutter build windows --release -v > ../build_log.txt 2>&1

      - name: Commit and Push Build Log
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add build_log.txt || true
          git commit -m "Add build log [skip ci]" || true
          git pull --rebase || true
          git push || true

      - name: Commit and Push EXE file to Repository
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p releases
          cp -r flutter/build/windows/x64/runner/Release/* releases/ 2>/dev/null || \
          cp -r flutter/build/windows/runner/Release/* releases/ 2>/dev/null || \
          echo "No release files found"

          git add releases/ || true
          git commit -m "Add compiled Windows Release files [skip ci]" || true
          git pull --rebase || true
          git push || true

      - name: Upload Output Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NanoDesk-Windows-Release
          path: |
            flutter/build/windows/x64/runner/Release/
            flutter/build/windows/runner/Release/

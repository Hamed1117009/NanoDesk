name: Build Windows App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build for Windows
    runs-on: windows-latest

    # تعریف متغیرهای محیطی برای کل مراحل بیلد
    env:
      VCPKG_ROOT: "C:\\vcpkg"
      VCPKG_DEFAULT_TRIPLET: "x64-windows-static"
      BINDGEN_EXTRA_CLANG_ARGS: "-I C:/vcpkg/installed/x64-windows-static/include -I C:/vcpkg/installed/x64-windows-static/include/opus"
      # سرورهای شما مستقیماً در همه مراحل در دسترس خواهند بود
      RENDEZVOUS_SERVER: "185.192.113.204"
      RS_PUB_KEY: "nq0HcZjf94JGTpvGCazMxyEmIHEFxpXOFDa0C12A3a8="

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: "stable"

      - name: Install LLVM (Required for bindgen)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "15.0"
          directory: ${{ runner.temp }}/llvm

      - name: Install vcpkg dependencies (Opus)
        run: |
          vcpkg install opus:x64-windows-static --classic
          vcpkg integrate install

      - name: Verify Opus Headers (Debug Step)
        shell: bash
        run: |
          echo "Checking for Opus headers..."
          ls -la /c/vcpkg/installed/x64-windows-static/include/opus/ || echo "Opus directory not found!"
          ls -la /c/vcpkg/installed/x64-windows-static/include/ || echo "Include directory not found!"

      - name: Install Flutter Dependencies
        working-directory: ./flutter
        shell: bash
        run: |
          flutter pub get -v 2>&1 | tee ../pub_get_log.txt
          if [ ${PIPESTATUS[0]} -ne 0 ]; then exit 1; fi

      - name: Generate Flutter Code (build_runner)
        working-directory: ./flutter
        shell: bash
        run: |
          flutter pub run build_runner build --delete-conflicting-outputs
          if [ ${PIPESTATUS[0]} -ne 0 ]; then exit 1; fi

      - name: Run build.py (Compile Rust & Build Flutter Windows & Pack Portable)
        shell: bash
        env:
          # اطمینان از اینکه bindgen کتابخانه‌های llvm را در ویندوز پیدا می‌کند
          LIBCLANG_PATH: ${{ runner.temp }}/llvm/lib
        run: |
          python -m pip install --upgrade pip
          # نکته کلیدی: حتماً باید --flutter ارسال شود تا نسخه فلاتر ساخته شود
          python build.py --flutter 2>&1 | tee build_log.txt
          if [ ${PIPESTATUS[0]} -ne 0 ]; then exit 1; fi

      - name: Commit and Push Logs
        if: always()
        shell: bash
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add pub_get_log.txt build_log.txt || true
          git commit -m "Add build logs" || echo "No changes to commit"
          git pull --rebase --autostash origin main
          git push

      - name: Commit and Push EXE files
        shell: bash
        run: |
          mkdir -p releases
          # کپی کردن فایل‌های بیلد فلاتر
          cp -r flutter/build/windows/x64/runner/Release/* releases/ || echo "No Flutter EXE found"
          # کپی کردن فایل ستاپ پرتابل ساخته شده توسط اسکریپت پایتون
          cp rustdesk-*.exe releases/ || echo "No Portable Installer found"
          git add releases/
          git commit -m "Add compiled EXE files" || echo "No changes to commit"
          git pull --rebase --autostash origin main
          git push

      - name: Upload Output Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: releases/

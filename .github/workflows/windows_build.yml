name: Build Windows App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build for Windows
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: "stable"

      - name: Install Dependencies
        working-directory: ./flutter
        shell: bash
        run: |
          flutter pub get -v 2>&1 | tee ../pub_get_log.txt
          if [ ${PIPESTATUS[0]} -ne 0 ]; then exit 1; fi

      - name: Commit and Push pub get Log
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add pub_get_log.txt
          git commit -m "Add pub get log" || echo "No changes to commit"
          git push

      - name: Build Windows Release
        working-directory: ./flutter
        shell: bash
        env:
          RENDEZVOUS_SERVER: "185.192.113.204"
          RS_PUB_KEY: "nq0HcZjf94JGTpvGCazMxyEmIHEFxpXOFDa0C12A3a8="
        run: |
          flutter build windows --release -v 2>&1 | tee ../build_log.txt
          if [ ${PIPESTATUS[0]} -ne 0 ]; then exit 1; fi

      - name: Commit and Push Build Log
        run: |
          git add build_log.txt
          git commit -m "Add build log" || echo "No changes to commit"
          git push

      - name: Commit and Push EXE file to Repository
        shell: bash
        run: |
          mkdir -p releases
          cp -r flutter/build/windows/x64/runner/Release/* releases/ || echo "No EXE found to copy"
          cp -r flutter/build/windows/runner/Release/* releases/ || echo "No EXE found to copy"
          git add releases/
          git commit -m "Add compiled EXE files" || echo "No changes to commit"
          git push

      - name: Upload Output Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            flutter/build/windows/x64/runner/Release/
            flutter/build/windows/runner/Release/

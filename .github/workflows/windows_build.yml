name: Build Windows App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    # تعریف متغیرهای محیطی برای اجرای صحیح bindgen در Rust
    env:
      LIBCLANG_PATH: "C:/Program Files/LLVM/bin"
      BINDGEN_EXTRA_CLANG_ARGS: "-I C:/vcpkg/installed/x64-windows-static/include"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install C++ Dependencies (vcpkg)
        run: |
          vcpkg integrate install
          vcpkg install opus:x64-windows-static libvpx:x64-windows-static libyuv:x64-windows-static libaom:x64-windows-static --classic

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0" # یا نسخه دلخواه شما
          channel: "stable"

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Run Build Runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows App (Release)
        run: flutter build windows --release

      - name: Prepare Release Directory
        run: |
          mkdir -p releases
          cp -r build/windows/x64/runner/Release/* releases/

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NanoDesk-Windows-Release
          path: releases/
